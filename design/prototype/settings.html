<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemoLens - Settings Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="home.html">MemoLens</a>
      <nav class="side-nav">
        <a class="nav-item" href="timeline.html"><span class="nav-icon icon-timeline"></span>Timeline</a>
        <a class="nav-item" href="timeline.html"><span class="nav-icon icon-memory"></span>Memories</a>
        <a class="nav-item" href="albums.html"><span class="nav-icon icon-album"></span>Albums</a>
        <a class="nav-item" href="trash.html"><span class="nav-icon icon-trash"></span>Trash</a>
        <a class="nav-item active" href="settings.html"><span class="nav-icon icon-settings"></span>Settings</a>
      </nav>
    </aside>
    <div>
      <header class="topbar"><a class="brand" href="home.html">MemoLens</a><span class="menu-dot">☰</span></header>
      <main class="main">
        <header class="page-header"><div><h1 class="page-title">Cài đặt</h1><p class="subtitle">Quản lý tài khoản và tùy chọn cá nhân.</p></div><a class="btn primary" href="#">Lưu thay đổi</a></header>
        <section class="settings-grid">
          <article class="settings-card paper-card tape">
            <h2>Tài khoản</h2>
            <div class="account-row">
              <div class="avatar">M</div>
              <div><p style="margin:0;color:var(--muted);">Tên hiển thị</p><strong>Minh Anh</strong><p style="margin:12px 0 0;color:var(--muted);">Email</p><strong>minhanh@email.com</strong></div>
              <span class="chip">Đã xác thực</span>
            </div>
          </article>
          <article class="settings-card paper-card tape">
            <h2>Đổi mật khẩu</h2>
            <form class="settings-form">
              <label class="field"><span>Mật khẩu hiện tại</span><input class="input" type="password" placeholder="Nhập mật khẩu hiện tại"></label>
              <label class="field"><span>Mật khẩu mới</span><input class="input" type="password" placeholder="Nhập mật khẩu mới"></label>
              <label class="field"><span>Xác nhận mật khẩu mới</span><input class="input" type="password" placeholder="Nhập lại mật khẩu mới"></label>
              <button class="btn primary" type="button" style="justify-self:center;">Cập nhật mật khẩu</button>
            </form>
          </article>
        </section>
      </main>
    </div>
  </div>
  <nav class="mobile-nav"><a href="timeline.html">Timeline</a><a href="timeline.html">Memory</a><a href="albums.html">Albums</a><a href="trash.html">Trash</a><a class="active" href="settings.html">Settings</a></nav>
</body>
</html>
