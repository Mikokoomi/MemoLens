<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemoLens - Register Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card paper-card">
      <div class="auth-mark">✦</div>
      <h1>Tạo tài khoản</h1>
      <p>Lưu giữ những khoảnh khắc đáng nhớ.</p>
      <form class="auth-form">
        <label class="field"><span>Tên hiển thị</span><input class="input" placeholder="Tên hiển thị"></label>
        <label class="field"><span>Email</span><input class="input" type="email" placeholder="Email"></label>
        <label class="field"><span>Mật khẩu</span><input class="input" type="password" placeholder="Mật khẩu"></label>
        <label class="field"><span>Xác nhận mật khẩu</span><input class="input" type="password" placeholder="Xác nhận mật khẩu"></label>
        <button class="btn primary" type="button">Tạo tài khoản</button>
      </form>
      <p style="margin-top:22px;">Đã có tài khoản? <a style="font-weight:700;text-decoration:underline;text-underline-offset:4px;" href="login.html">Đăng nhập</a></p>
    </section>
  </main>
</body>
</html>
