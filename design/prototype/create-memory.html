<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemoLens - Create Memory Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="home.html">MemoLens</a>
      <nav class="side-nav">
        <a class="nav-item" href="timeline.html"><span class="nav-icon icon-timeline"></span>Dòng thời gian</a>
        <a class="nav-item active" href="timeline.html"><span class="nav-icon icon-memory"></span>Kỷ niệm</a>
        <a class="nav-item" href="albums.html"><span class="nav-icon icon-album"></span>Bộ sưu tập</a>
        <a class="nav-item" href="trash.html"><span class="nav-icon icon-trash"></span>Thùng rác</a>
        <a class="nav-item" href="settings.html"><span class="nav-icon icon-settings"></span>Cài đặt</a>
      </nav>
    </aside>
    <div>
      <header class="topbar"><a class="brand" href="home.html">MemoLens</a><span class="menu-dot">☰</span></header>
      <main class="main">
        <section class="form-shell">
          <header class="page-header">
            <div>
              <h1 class="page-title">Tạo kỷ niệm</h1>
              <p class="subtitle">Ghi lại khoảnh khắc, cảm xúc và câu chuyện của bạn.</p>
            </div>
          </header>
          <form class="form-card paper-card tape">
            <section class="form-section">
              <h2>Câu chuyện</h2>
              <textarea class="textarea" placeholder="Hôm nay bạn muốn nhớ điều gì?..."></textarea>
            </section>
            <section class="form-section">
              <div class="form-row">
                <label class="field"><span>Ngày</span><input class="input" value="20/06/2024"></label>
                <label class="field"><span>Cảm xúc</span><select class="select"><option>Chọn cảm xúc</option><option>Bình yên</option></select></label>
                <label class="field"><span>Địa điểm</span><input class="input" placeholder="Nhập địa điểm"></label>
              </div>
            </section>
            <section class="form-section">
              <label class="field"><span>Thẻ</span><input class="input" placeholder="Thêm thẻ (ví dụ: du lịch, bạn bè...)"></label>
            </section>
            <section class="form-section">
              <h2>Ảnh</h2>
              <div class="upload-box">
                <div>
                  <strong>Thêm ảnh vào kỷ niệm</strong>
                  <p>Kéo thả hoặc chọn ảnh từ thiết bị</p>
                </div>
              </div>
            </section>
            <div class="form-actions">
              <a class="btn" href="timeline.html">Hủy</a>
              <button class="btn primary" type="button">Lưu kỷ niệm</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>
  <nav class="mobile-nav"><a href="timeline.html">Dòng</a><a class="active" href="timeline.html">Kỷ niệm</a><a href="albums.html">Bộ sưu tập</a><a href="trash.html">Rác</a><a href="settings.html">Cài đặt</a></nav>
</body>
</html>
