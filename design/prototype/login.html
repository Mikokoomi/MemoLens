<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemoLens - Login Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card paper-card">
      <div class="auth-mark">⌁</div>
      <strong>MemoLens</strong>
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục lưu giữ ký ức đẹp.</p>
      <form class="auth-form">
        <label class="field">
          <span>Email</span>
          <input class="input" type="email" placeholder="Email">
        </label>
        <label class="field">
          <span>Mật khẩu</span>
          <input class="input" type="password" placeholder="Mật khẩu">
        </label>
        <label class="field" style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" checked>
          <span>Ghi nhớ đăng nhập</span>
        </label>
        <button class="btn primary" type="button">Đăng nhập</button>
      </form>
      <div class="divider">hoặc</div>
      <div class="auth-links">
        <a href="register.html">Tạo tài khoản</a>
        <a href="#">Quên mật khẩu?</a>
      </div>
    </section>
  </main>
</body>
</html>
